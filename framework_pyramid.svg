<svg viewBox="0 0 680 520" width="100%" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Serenity Investment Framework - 5-Layer Pyramid</title>
<desc>Visual representation of Serenity's 5-layer supply chain bottleneck investment framework, from macro CapEx guidance at the top to day trading execution at the bottom.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- Layer 1: Macro CapEx (Top) -->
<g class="c-blue">
  <rect x="140" y="40" width="400" height="56" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-primary)" stroke-width="0.5"/>
  <text class="th" x="340" y="62" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)">Layer 1: Macro CapEx Guidance</text>
  <text class="ts" x="340" y="84" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-secondary)">Hyperscaler Capex trends, government policies</text>
</g>

<!-- Arrow 1 → 2 -->
<polyline points="340,96 340,118" fill="none" stroke="var(--color-border-secondary)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Layer 2: Bottleneck Identification -->
<g class="c-purple">
  <rect x="100" y="118" width="480" height="56" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-primary)" stroke-width="0.5"/>
  <text class="th" x="340" y="140" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)">Layer 2: Bottleneck Identification</text>
  <text class="ts" x="340" y="162" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-secondary)">Supply chain mapping, find the narrowest link</text>
</g>

<!-- Arrow 2 → 3 -->
<polyline points="340,174 340,196" fill="none" stroke="var(--color-border-secondary)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Layer 3: Company Screening -->
<g class="c-teal">
  <rect x="60" y="196" width="560" height="56" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-primary)" stroke-width="0.5"/>
  <text class="th" x="340" y="218" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)">Layer 3: Company Screening</text>
  <text class="ts" x="340" y="240" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-secondary)">Technical moat, capacity binding, margin trend</text>
</g>

<!-- Arrow 3 → 4 -->
<polyline points="340,252 340,274" fill="none" stroke="var(--color-border-secondary)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Layer 4: Position Sizing -->
<g class="c-coral">
  <rect x="20" y="274" width="640" height="56" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-primary)" stroke-width="0.5"/>
  <text class="th" x="340" y="296" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)">Layer 4: Position Sizing</text>
  <text class="ts" x="340" y="318" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-secondary)">Core (>5%), Swing (2-5%), Lottery (<2%)</text>
</g>

<!-- Arrow 4 → 5 -->
<polyline points="340,330 340,352" fill="none" stroke="var(--color-border-secondary)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Layer 5: Day Trading Execution (Bottom) -->
<g class="c-amber">
  <rect x="40" y="352" width="600" height="68" rx="8" fill="var(--color-background-primary)" stroke="var(--color-border-primary)" stroke-width="0.5"/>
  <text class="th" x="340" y="378" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)">Layer 5: Day Trading Execution</text>
  <text class="ts" x="340" y="400" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-secondary)">Trade around core positions, stop-thesis not stop-loss</text>
  <text class="ts" x="340" y="418" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-tertiary)">70% long-term hold + 30% day trading</text>
</g>

<!-- Core Philosophy Box -->
<g class="c-green">
  <rect x="140" y="440" width="400" height="60" rx="12" fill="var(--color-background-primary)" stroke="var(--color-border-primary)" stroke-width="0.5"/>
  <text class="th" x="340" y="462" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-primary)">Core Philosophy</text>
  <text class="ts" x="340" y="484" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-secondary)">"The bottleneck is not demand, it's supply chain."</text>
  <text class="ts" x="340" y="502" text-anchor="middle" dominant-baseline="central" fill="var(--color-text-tertiary)">— Serenity (@aleabitoreddit)</text>
</g>

</svg>